<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twin Cities Architecture Job Radar</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --flag: #f59e0b;
    --flag-bg: rgba(245, 158, 11, 0.08);
    --green: #22c55e;
    --red: #ef4444;
    --p1: #22c55e;
    --p2: #3b82f6;
    --p3: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
  }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-dim); font-size: 13px; }
  .stats {
    display: flex; gap: 24px;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-value.flag { color: var(--flag); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .controls {
    display: flex; gap: 12px;
    padding: 16px 32px; align-items: center; flex-wrap: wrap;
  }
  .controls input, .controls select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
  }
  .controls input { min-width: 280px; }
  .container { padding: 20px 32px 40px; max-width: 1400px; margin: 0 auto; }
  details.priority-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  details.priority-group > summary {
    padding: 16px 20px;
    cursor: pointer;
    list-style: none;
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2);
    user-select: none;
  }
  details.priority-group > summary::-webkit-details-marker { display: none; }
  details.priority-group > summary::before {
    content: "▶"; font-size: 10px; color: var(--text-dim);
    transition: transform 0.2s;
  }
  details.priority-group[open] > summary::before { transform: rotate(90deg); }
  .pgroup-title { font-size: 16px; font-weight: 600; }
  .pgroup-count {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 12px;
  }
  .firm-row {
    border-top: 1px solid var(--border);
    padding: 14px 20px 14px 44px;
  }
  .firm-row .firm-name {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 10px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge.p1 { background: rgba(34, 197, 94, 0.15); color: var(--p1); }
  .badge.p2 { background: rgba(59, 130, 246, 0.15); color: var(--p2); }
  .badge.p3 { background: rgba(148, 163, 184, 0.15); color: var(--p3); }
  .badge.score { background: rgba(245, 158, 11, 0.15); color: var(--flag); font-weight: 700; }
  .badge.score-high { background: rgba(34, 197, 94, 0.18); color: var(--p1); font-weight: 700; }
  .firm-meta { font-size: 12px; color: var(--text-dim); }
  .firm-jobs { margin-top: 8px; }
  .firm-jobs ul { list-style: none; padding-left: 0; }
  .firm-jobs li {
    padding: 8px 12px;
    border-left: 2px solid var(--border);
    margin: 6px 0;
    background: var(--surface2);
    border-radius: 0 6px 6px 0;
    display: flex; flex-direction: column; gap: 4px;
  }
  .firm-jobs li.flagged { border-left-color: var(--flag); background: var(--flag-bg); }
  .firm-jobs li.high { border-left-color: var(--green); }
  .job-row { display: flex; align-items: center; gap: 12px; }
  .firm-jobs a { color: var(--text); text-decoration: none; flex: 1; }
  .firm-jobs a:hover { color: var(--accent); }
  .job-detail {
    color: var(--text-dim); font-size: 12px;
  }
  .job-detail .sep { opacity: 0.5; padding: 0 6px; }
  .empty-state {
    padding: 12px 20px 12px 44px;
    color: var(--text-dim);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  .footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 24px;
  }

  .jobs-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .jobs-table th {
    text-align: left;
    padding: 12px 14px;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .jobs-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .jobs-table tbody tr:last-child td { border-bottom: none; }
  .jobs-table tbody tr:hover { background: var(--surface2); }
  .jobs-table tr.flagged { background: var(--flag-bg); }
  .jobs-table tr.high td:first-child { border-left: 3px solid var(--green); }
  .jobs-table .col-fit { width: 60px; }
  .jobs-table .col-score { width: 60px; }
  .jobs-table .col-title { min-width: 280px; }
  .jobs-table .col-firm { width: 240px; }
  .jobs-table .col-detail { color: var(--text-dim); font-size: 13px; }
  .jobs-table a { color: var(--text); text-decoration: none; }
  .jobs-table a:hover { color: var(--accent); text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <h1>Twin Cities Architecture Job Radar</h1>
  <div class="subtitle">Open positions at architecture firms within ~30 mi of 55408</div>
</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Filter by firm or title…">
  <select id="priorityFilter">
    <option value="">All priorities</option>
    <option value="P1">P1 only (top-15)</option>
    <option value="P2">P2 only</option>
    <option value="P3">P3 only</option>
  </select>
  <select id="scoreFilter">
    <option value="0">All scores</option>
    <option value="40">Score ≥ 40</option>
    <option value="60">Score ≥ 60</option>
    <option value="80">Score ≥ 80</option>
  </select>

</div>

<div class="container" id="content">
  <p style="color: var(--text-dim);">Loading jobs.json…</p>
</div>

<div class="footer" id="footer"></div>

<script>
const PRIORITY_LABELS = {
  P1: "Priority 1 — Top 15 firms",
  P2: "Priority 2 — Mid-size firms",
  P3: "Priority 3 — Specialty / smaller firms",
};

function formatLocation(loc) {
  if (!loc) return "";
  const TARGETS = [
    // MSP
    "minneapolis","st. paul","saint paul","st paul","minnetonka",
    "bloomington","edina","eden prairie","plymouth","maple grove",
    "wayzata","apple valley","burnsville","richfield",
    "golden valley","st louis park","st. louis park",
    // San Diego area
    "san diego","chula vista","carlsbad","encinitas","oceanside",
    "la jolla","el cajon","la mesa","coronado",
    // Newport Beach / Orange County
    "newport beach","costa mesa","irvine","huntington beach",
    "anaheim","santa ana","tustin","mission viejo","laguna beach",
    "lake forest","aliso viejo","fountain valley",
    // Santa Monica / LA area
    "santa monica","los angeles","beverly hills","culver city",
    "west hollywood","pasadena","burbank","glendale","long beach",
    "manhattan beach","redondo beach","el segundo","marina del rey",
    "venice","malibu","torrance","inglewood",
    // Chicago
    "chicago",
  ];
  // Split on semicolons or commas separating multiple locations
  const parts = loc.split(/;\s*/);
  const matches = [];
  for (const p of parts) {
    const lower = p.toLowerCase();
    for (const city of TARGETS) {
      if (lower.includes(city)) {
        // Extract just the city name (first segment before any comma)
        const cityOnly = p.split(",")[0].trim();
        if (!matches.includes(cityOnly)) matches.push(cityOnly);
        break;
      }
    }
  }
  if (matches.length === 0) {
    // Fallback: show first city only
    return loc.split(/[,;]/)[0].trim();
  }
  if (parts.length > matches.length) {
    return matches.join(", ") + ` +${parts.length - matches.length} more`;
  }
  return matches.join(", ");
}

function formatScanLocal(iso) {
  if (!iso) return "(unknown)";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso.slice(0, 16);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function load() {
  let data;
  try {
    const r = await fetch("jobs.json", { cache: "no-store" });
    data = await r.json();
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<p style="color:var(--red);">Could not load jobs.json — run <code>python job_scraper.py</code> first.</p>`;
    return;
  }

  // Flatten jobs and sort by score descending
  const allJobs = (data.jobs || []).slice().sort((a, b) => (b.fit||0) - (a.fit||0));

  // Stats
  const total = allJobs.length;
  const high = allJobs.filter(j => (j.fit||0) >= 50).length;
  const firmsWithJobs = new Set(allJobs.map(j => j.firm)).size;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total listings</div></div>
    <div class="stat"><div class="stat-value flag">${high}</div><div class="stat-label">Fit ≥ 50</div></div>
    <div class="stat"><div class="stat-value">${firmsWithJobs}</div><div class="stat-label">Firms with openings</div></div>
    <div class="stat"><div class="stat-value">${formatScanLocal(data.scraped_at)}</div><div class="stat-label">Last updated</div></div>
  `;

  document.getElementById("footer").innerHTML =
    `Last updated: ${formatScanLocal(data.scraped_at)} &nbsp;|&nbsp; Adkins Architects Inc.`;

  window._jobs = allJobs;
  render();
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const pFilter = document.getElementById("priorityFilter").value;
  const sFilter = parseInt(document.getElementById("scoreFilter").value, 10);

  const jobs = (window._jobs || []).filter(j => {
    if (pFilter && j.priority !== pFilter) return false;
    if (j.score < sFilter) return false;
    if (search) {
      const hay = (j.firm + " " + j.title).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  const root = document.getElementById("content");
  root.innerHTML = "";

  if (!jobs.length) {
    root.innerHTML = `<p style="color: var(--text-dim);">No jobs match the current filters.</p>`;
    return;
  }

  // Build a single flat table of jobs
  const table = document.createElement("table");
  table.className = "jobs-table";
  table.innerHTML = `
    <thead>
      <tr>
        <th class="col-fit">Fit</th>
        <th class="col-score">Score</th>
        <th class="col-title">Title</th>
        <th class="col-firm">Firm</th>
        <th class="col-detail">Location · Posted</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector("tbody");
  for (const j of jobs) {
    const scoreClass = j.score >= 60 ? "score-high" : "score";
    const tr = document.createElement("tr");
    tr.className = j.score >= 80 ? "high" : (j.score >= 60 ? "flagged" : "");
    const details = [formatLocation(j.location), j.posted].filter(x => x).join(' · ');
    const fit = j.fit || 0;
    const fitClass = fit >= 50 ? "score-high" : "score";
    const fbd = j.fit_breakdown || {};
    const fitTip = `Autonomy ${fbd.autonomy||0} | Creative ${fbd.creative||0} | Lifestyle ${fbd.lifestyle||0} | TechLeverage ${fbd.tech_leverage||0} | TechDepth ${fbd.tech_depth||0} | Comp ${fbd.compensation||0} | Alignment ${fbd.alignment||0}`;
    tr.innerHTML = `
      <td class="col-fit"><span class="badge ${fitClass}" title="${fitTip}">${fit}</span></td>
      <td class="col-score"><span class="badge ${scoreClass}">${j.score}</span></td>
      <td class="col-title"><a href="${j.url}" target="_blank" rel="noopener">${j.title}</a></td>
      <td class="col-firm">${j.firm} <span class="badge ${j.priority.toLowerCase()}">${j.priority}</span></td>
      <td class="col-detail">${details}</td>
    `;
    tbody.appendChild(tr);
  }
  root.appendChild(table);
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("priorityFilter").addEventListener("change", render);
document.getElementById("scoreFilter").addEventListener("change", render);

load();
</script>

</body>
</html>
