<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twin Cities Architecture Job Radar</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --flag: #f59e0b;
    --flag-bg: rgba(245, 158, 11, 0.08);
    --green: #22c55e;
    --red: #ef4444;
    --p1: #22c55e;
    --p2: #3b82f6;
    --p3: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
  }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-dim); font-size: 13px; }
  .stats {
    display: flex; gap: 24px;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-value.flag { color: var(--flag); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .controls {
    display: flex; gap: 12px;
    padding: 16px 32px; align-items: center; flex-wrap: wrap;
  }
  .controls input, .controls select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
  }
  .controls input { min-width: 280px; }
  .container { padding: 20px 32px 40px; max-width: 1400px; margin: 0 auto; }
  details.priority-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  details.priority-group > summary {
    padding: 16px 20px;
    cursor: pointer;
    list-style: none;
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2);
    user-select: none;
  }
  details.priority-group > summary::-webkit-details-marker { display: none; }
  details.priority-group > summary::before {
    content: "▶"; font-size: 10px; color: var(--text-dim);
    transition: transform 0.2s;
  }
  details.priority-group[open] > summary::before { transform: rotate(90deg); }
  .pgroup-title { font-size: 16px; font-weight: 600; }
  .pgroup-count {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 12px;
  }
  .firm-row {
    border-top: 1px solid var(--border);
    padding: 14px 20px 14px 44px;
  }
  .firm-row .firm-name {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 10px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge.p1 { background: rgba(34, 197, 94, 0.15); color: var(--p1); }
  .badge.p2 { background: rgba(59, 130, 246, 0.15); color: var(--p2); }
  .badge.p3 { background: rgba(148, 163, 184, 0.15); color: var(--p3); }
  .badge.score { background: rgba(245, 158, 11, 0.15); color: var(--flag); font-weight: 700; }
  .badge.score-high { background: rgba(34, 197, 94, 0.18); color: var(--p1); font-weight: 700; }
  .firm-meta { font-size: 12px; color: var(--text-dim); }
  .firm-jobs { margin-top: 8px; }
  .firm-jobs ul { list-style: none; padding-left: 0; }
  .firm-jobs li {
    padding: 8px 12px;
    border-left: 2px solid var(--border);
    margin: 6px 0;
    background: var(--surface2);
    border-radius: 0 6px 6px 0;
    display: flex; flex-direction: column; gap: 4px;
  }
  .firm-jobs li.flagged { border-left-color: var(--flag); background: var(--flag-bg); }
  .firm-jobs li.high { border-left-color: var(--green); }
  .job-row { display: flex; align-items: center; gap: 12px; }
  .firm-jobs a { color: var(--text); text-decoration: none; flex: 1; }
  .firm-jobs a:hover { color: var(--accent); }
  .job-detail {
    color: var(--text-dim); font-size: 12px;
  }
  .job-detail .sep { opacity: 0.5; padding: 0 6px; }
  .empty-state {
    padding: 12px 20px 12px 44px;
    color: var(--text-dim);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  .footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 24px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Twin Cities Architecture Job Radar</h1>
  <div class="subtitle">Open positions at architecture firms within ~30 mi of 55408</div>
</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Filter by firm or title…">
  <select id="priorityFilter">
    <option value="">All priorities</option>
    <option value="P1">P1 only (top-15)</option>
    <option value="P2">P2 only</option>
    <option value="P3">P3 only</option>
  </select>
  <select id="scoreFilter">
    <option value="0">All scores</option>
    <option value="40">Score ≥ 40</option>
    <option value="60">Score ≥ 60</option>
    <option value="80">Score ≥ 80</option>
  </select>
  <select id="hideEmpty">
    <option value="0">Show all firms</option>
    <option value="1" selected>Hide firms with no jobs</option>
  </select>
</div>

<div class="container" id="content">
  <p style="color: var(--text-dim);">Loading jobs.json…</p>
</div>

<div class="footer" id="footer"></div>

<script>
const PRIORITY_LABELS = {
  P1: "Priority 1 — Top 15 firms",
  P2: "Priority 2 — Mid-size firms",
  P3: "Priority 3 — Specialty / smaller firms",
};

async function load() {
  let data;
  try {
    const r = await fetch("jobs.json", { cache: "no-store" });
    data = await r.json();
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<p style="color:var(--red);">Could not load jobs.json — run <code>python job_scraper.py</code> first.</p>`;
    return;
  }

  // Group jobs by firm
  const firms = {};
  for (const j of data.jobs || []) {
    if (!firms[j.firm]) firms[j.firm] = { priority: j.priority, city: j.city, jobs: [] };
    firms[j.firm].jobs.push(j);
  }

  // Stats
  const total = (data.jobs || []).length;
  const high = (data.jobs || []).filter(j => j.score >= 60).length;
  const firmsWithJobs = Object.keys(firms).length;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total listings</div></div>
    <div class="stat"><div class="stat-value flag">${high}</div><div class="stat-label">Score ≥ 60</div></div>
    <div class="stat"><div class="stat-value">${firmsWithJobs}</div><div class="stat-label">Firms with openings</div></div>
    <div class="stat"><div class="stat-value">${(data.scraped_at||"").slice(0,10)}</div><div class="stat-label">Last scan</div></div>
  `;

  document.getElementById("footer").textContent =
    `Last scrape: ${data.scraped_at || "(unknown)"} · ${total} listings`;

  window._firms = firms;
  render();
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const pFilter = document.getElementById("priorityFilter").value;
  const sFilter = parseInt(document.getElementById("scoreFilter").value, 10);
  const hideEmpty = document.getElementById("hideEmpty").value === "1";

  const firms = window._firms || {};
  const groups = { P1: [], P2: [], P3: [] };

  for (const [name, info] of Object.entries(firms)) {
    if (pFilter && info.priority !== pFilter) continue;
    const matchingJobs = info.jobs.filter(j => {
      if (j.score < sFilter) return false;
      if (search) {
        const hay = (name + " " + j.title).toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });
    if (hideEmpty && matchingJobs.length === 0) continue;
    (groups[info.priority] || groups.P3).push({ name, info, matchingJobs });
  }

  const root = document.getElementById("content");
  root.innerHTML = "";

  for (const p of ["P1", "P2", "P3"]) {
    if (!groups[p].length) continue;
    const totalJobs = groups[p].reduce((a, x) => a + x.matchingJobs.length, 0);
    const det = document.createElement("details");
    det.className = "priority-group";
    det.open = (p === "P1");

    const sum = document.createElement("summary");
    sum.innerHTML = `
      <span class="pgroup-title">${PRIORITY_LABELS[p]}</span>
      <span class="badge ${p.toLowerCase()}">${p}</span>
      <span class="pgroup-count">${groups[p].length} firms · ${totalJobs} listings</span>
    `;
    det.appendChild(sum);

    for (const { name, info, matchingJobs } of groups[p]) {
      const row = document.createElement("div");
      row.className = "firm-row";
      row.innerHTML = `
        <div class="firm-name">${name}
          <span class="badge ${info.priority.toLowerCase()}">${info.priority}</span>
        </div>
        <div class="firm-meta">${info.city || ""}</div>
      `;
      if (matchingJobs.length) {
        const ul = document.createElement("ul");
        for (const j of matchingJobs) {
          const li = document.createElement("li");
          li.className = j.score >= 80 ? "flagged high" : (j.score >= 60 ? "flagged" : "");
          const scoreClass = j.score >= 60 ? "score-high" : "score";
          const details = [j.location, j.posted].filter(x => x).join(' <span class="sep">·</span> ');
          li.innerHTML = `
            <div class="job-row">
              <a href="${j.url}" target="_blank" rel="noopener">${j.title}</a>
              <span class="badge ${scoreClass}">${j.score}</span>
            </div>
            ${details ? `<div class="job-detail">${details}</div>` : ""}
          `;
          ul.appendChild(li);
        }
        const wrap = document.createElement("div");
        wrap.className = "firm-jobs";
        wrap.appendChild(ul);
        row.appendChild(wrap);
      } else {
        row.innerHTML += `<div class="firm-meta" style="margin-top:6px;">No openings matched current filters.</div>`;
      }
      det.appendChild(row);
    }
    root.appendChild(det);
  }

  if (!root.children.length) {
    root.innerHTML = `<p style="color: var(--text-dim);">No firms match the current filters.</p>`;
  }
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("priorityFilter").addEventListener("change", render);
document.getElementById("scoreFilter").addEventListener("change", render);
document.getElementById("hideEmpty").addEventListener("change", render);

load();
</script>

</body>
</html>
