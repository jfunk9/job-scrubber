name: Run Job Scraper

on:
  # Manual trigger — the "Refresh" button on the Actions tab
  workflow_dispatch:

  # Auto-run on every push to main that changes scraper code or config
  # (skipped if only jobs.json/index.html changed — those are the workflow's own outputs)
  push:
    branches: [main]
    paths:
      - 'job_scraper.py'
      - 'firms.csv'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

  # Auto-run every weekday at 7:00 AM Central (12:00 UTC)
  schedule:
    - cron: '0 12 * * 1-5'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run scraper
        run: |
          python -c "
          import job_scraper as s
          import os
          # Override repo dir so output writes to repo root in CI
          s.GITHUB_REPO_DIR = os.getcwd()
          s.run()
          "

      - name: Commit and push updated dashboard
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add index.html jobs.json
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date +'%Y-%m-%d %H:%M UTC')"
          git push
